<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SHIFUMI 2</title>
    <script src="main.js"></script>
  </head>
  <body>
    <div id="shifumiDiv">
      <canvas
        id="humanPlayerCanvas"
        style="border: solid"
        width="328"
        height="328"
      ></canvas>
      <canvas
        id="computerPlayerCanvas"
        style="border: solid"
        width="328"
        height="328"
      ></canvas>
      <div>
        <label>Computer Score:</label>
        <span id="computerScoreLabel">0</span>
      </div>
      <div>
        <label>Human Score:</label>
        <span id="humanScoreLabel">0</span>
      </div>
      <button id="rockBtn">ROCK</button>
      <button id="paperBtn">PAPER</button>
      <button id="scissorsBtn">SCISSORS</button>
    </div>
    <div>
      <label>First to reach 3 points wins</label>
    </div>
  </body>
</html>
