# CM Modif du port

<VirtualHost *:8080>

	# The ServerName directive sets the request scheme, hostname and port that
	# the server uses to identify itself. This is used when creating
	# redirection URLs. In the context of virtual hosts, the ServerName
	# specifies what hostname must appear in the request's Host: header to
	# match this virtual host. For the default virtual host (this file) this
	# value is not decisive as it is used as a last resort host regardless.
	# However, you must set it for any further virtual host explicitly.

	#ServerName www.example.com

	ServerAdmin webmaster@localhost

# CM modif du chemin 

	DocumentRoot "/users/elo/rchaigne/ahhhhhhhhhh/ehcapa/apache2/htdocs"

# CM ajout des droits sur l'arborescence

	<Directory "/users/elo/rchaigne/ahhhhhhhhhh/ehcapa/apache2/htdocs">
		Options Indexes FollowSymLinks
		AllowOverride None
		#Require all granted
		Require local
	</Directory>

	ScriptAlias /cgi-bin/ "/users/elo/rchaigne/ahhhhhhhhhh/ehcapa/apache2/cgi-bin/"
	<Directory "/users/elo/rchaigne/ahhhhhhhhhh/ehcapa/apache2/cgi-bin">
		AllowOverride None
		Options +ExecCGI +SymLinksIfOwnerMatch
                #Require all granted
                Require local
	</Directory>

	# Available loglevels: trace8, ..., trace1, debug, info, notice, warn,
	# error, crit, alert, emerg.
	# It is also possible to configure the loglevel for particular
	# modules, e.g.
	#LogLevel info ssl:warn


# CM modif du chemin 

	ErrorLog "/users/elo/rchaigne/ahhhhhhhhhh/ehcapa/apache2/log/vhost_error.log"

	CustomLog "/users/elo/rchaigne/ahhhhhhhhhh/ehcapa/apache2/log/vhost_access.log" combined

# CM ajout pour PHP

# Les paramètres spécifiques pour PHP sont dans le fichier 
# /users/elo/rchaigne/ahhhhhhhhhh/ehcapa/apache2/conf-enabled/php-local-enssat.conf
# Si besoin ne pas hésiter à modifier ce fichier ou à rajouter des infos ici

<ifModule mod_php7.c>
	php_admin_value session.save_path "/users/elo/rchaigne/ahhhhhhhhhh/ehcapa/apache2/var/php"
	php_admin_value display_errors "On"
</ifModule>

</VirtualHost>
